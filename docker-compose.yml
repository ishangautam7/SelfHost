version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - API_PORT=3001
      - DATABASE_URL=sqlite://data/selfhost.db?mode=rwc
      - JWT_SECRET=change-me-in-production-please
      - SERVER_HOST=localhost
      - SERVER_PORT=8080
    volumes:
      - ./data:/app/data

  server:
    build:
      context: .
      dockerfile: server.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=sqlite://data/selfhost.db?mode=rwc
      - JWT_SECRET=change-me-in-production-please
      - BASE_DOMAIN=selfhost.ishangautam7.com.np
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
